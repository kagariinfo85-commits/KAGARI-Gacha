<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121212">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<title>Gacha System</title>

<style>
body { margin:0; font-family:sans-serif; background:#121212; color:#eee; }
header { text-align:center; padding:10px; background:#111; }
.nav { display:flex; justify-content:center; gap:10px; }
.screen { display:none; padding:10px; }
.active { display:block; }
button { padding:10px; border:none; border-radius:10px; background:#333; color:#fff; }
.primary { background:#3b82f6; }
input,select,textarea { width:100%; margin:5px 0; padding:10px; border-radius:8px; background:#1a1a1a; color:#fff; border:1px solid #444; }
.card { background:#222; padding:10px; margin:5px 0; border-radius:10px; }
.result-item { display:flex; justify-content:space-between; padding:10px; margin:5px 0; background:#222; border-radius:10px; }
.modal { position:fixed; top:0; left:0; width:100%; height:100%; display:none; justify-content:center; align-items:center; background:rgba(0,0,0,0.7);}
.modal-content { background:#2a2a2a; padding:20px; border-radius:10px; width:90%; }
</style>
</head>

<body>

<header>Gacha System</header>

<div class="nav">
<button onclick="showScreen('gacha')">ガチャ</button>
<button onclick="showScreen('admin')">管理</button>
<button onclick="showScreen('log')">履歴</button>
</div>

<div id="gacha" class="screen active">
<input id="username" placeholder="名前">
<button onclick="draw(1)">単発</button>
<button onclick="draw(5)">5連</button>
<button onclick="draw(10)">10連</button>

<input id="count" type="number" placeholder="回数入力">
<button onclick="customDraw()">回す</button>

<div id="result"></div>

<textarea id="shareText"></textarea>
<button onclick="copyResult()">コピー</button>
<button onclick="postToX()">X投稿</button>
</div>

<div id="admin" class="screen">
<button onclick="openModal()">追加</button>
<button onclick="clearAll()">全削除</button>
<div id="list"></div>
</div>

<div id="log" class="screen">
<button onclick="clearLog()">履歴削除</button>
<div id="logList"></div>
</div>

<div id="modal" class="modal">
<div class="modal-content">
<input id="name" placeholder="商品名">
<select id="rarity">
<option>UR</option><option>SSR</option><option>SR</option><option>R</option><option>N</option>
</select>
<input id="weight" type="number" placeholder="重み">
<input id="stock" type="number" placeholder="在庫(-1で∞)">
<button onclick="saveItem()">保存</button>
<button onclick="closeModal()">閉じる</button>
</div>
</div>

<script>
const listEl = document.getElementById("list");
const modalEl = document.getElementById("modal");
const nameEl = document.getElementById("name");
const rarityEl = document.getElementById("rarity");
const weightEl = document.getElementById("weight");
const stockEl = document.getElementById("stock");
const resultEl = document.getElementById("result");
const shareEl = document.getElementById("shareText");
const usernameEl = document.getElementById("username");
const countEl = document.getElementById("count");
const logListEl = document.getElementById("logList");

let items = JSON.parse(localStorage.getItem("gacha")) || [];
let logs = JSON.parse(localStorage.getItem("gachaLog")) || [];
let editIndex = null;

function showScreen(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function render(){
listEl.innerHTML="";
items.forEach((item,i)=>{
const stockText=item.stock===-1?"∞":item.stock;
listEl.innerHTML+=`
<div class="card">
[${item.rarity}] ${item.name}<br>
${item.weight} / ${stockText}<br>
<button onclick="editItem(${i})">編集</button>
<button onclick="deleteItem(${i})">削除</button>
</div>`;
});
}

function openModal(){
editIndex=null;
nameEl.value="";weightEl.value="";stockEl.value="";
modalEl.style.display="flex";
}

function closeModal(){ modalEl.style.display="none"; }

function saveItem(){
const n=nameEl.value.trim();
const r=rarityEl.value;
const w=Number(weightEl.value);
let s=stockEl.value;
if(s==="") s=-1;
s=Number(s);

if(!n||isNaN(w)||w<=0) return alert("入力エラー");

const data={name:n,rarity:r,weight:w,stock:s};
if(editIndex===null) items.push(data);
else items[editIndex]=data;

localStorage.setItem("gacha",JSON.stringify(items));
closeModal();
render();
}

function editItem(i){
const item=items[i];
nameEl.value=item.name;
rarityEl.value=item.rarity;
weightEl.value=item.weight;
stockEl.value=item.stock;
editIndex=i;
modalEl.style.display="flex";
}

function deleteItem(i){
if(!confirm("削除しますか？")) return;
items.splice(i,1);
localStorage.setItem("gacha",JSON.stringify(items));
render();
}

function clearAll(){
items=[];
localStorage.removeItem("gacha");
render();
}

function drawOne(){
const total=items.reduce((s,i)=>s+i.weight,0);
let r=Math.random()*total;
for(let item of items){ r-=item.weight; if(r<=0) return item; }
}

function draw(count){
const user=usernameEl.value.trim();
if(!user) return alert("名前入力");

let map={};
for(let i=0;i<count;i++){
const item=drawOne();
if(!item) continue;
const key=item.name+"_"+item.rarity;
if(!map[key]) map[key]={...item,count:0};
map[key].count++;
}

const results=Object.values(map);

let html="";
results.forEach(r=>{
html+=`<div class="result-item">[${r.rarity}] ${r.name} ×${r.count}</div>`;
});
resultEl.innerHTML=html;

let text="【ガチャ結果】\n名前："+user+"\n";
results.forEach(r=>{ text+=r.rarity+"："+r.name+" ×"+r.count+"\n"; });
shareEl.value=text;

saveLog(user,count,text);
}

function customDraw(){
const c=Number(countEl.value);
if(!c) return alert("回数入力");
draw(c);
}

function copyResult(){
navigator.clipboard.writeText(shareEl.value);
alert("コピーしました");
}

function postToX(){
const text=encodeURIComponent(shareEl.value);
window.open("https://twitter.com/intent/tweet?text="+text);
}

function saveLog(user,count,text){
logs.unshift({time:new Date().toLocaleString(),user,count,text});
localStorage.setItem("gachaLog",JSON.stringify(logs));
renderLog();
}

function renderLog(){
logListEl.innerHTML="";
logs.forEach(l=>{
logListEl.innerHTML+=`<div class="log">${l.time} ${l.user}<br>${l.text}</div>`;
});
}

function clearLog(){
logs=[];
localStorage.removeItem("gachaLog");
renderLog();
}

render();
renderLog();
</script>

<script>
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
