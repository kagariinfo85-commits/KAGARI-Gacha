<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121212">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Gacha System</title>

<style>
body { margin:0; font-family:sans-serif; background:#121212; color:#eee; }
button { padding:10px; border-radius:10px; border:none; background:#333; color:#fff; }
.primary { background:#3b82f6; }
.screen { display:none; padding:10px; }
.active { display:block; }
.card { background:#222; padding:10px; margin:5px 0; border-radius:10px; }
.result-item { display:flex; justify-content:space-between; background:#222; padding:10px; margin:5px 0; border-radius:10px; }
</style>
</head>

<body>

<button onclick="showScreen('gacha')">ガチャ</button>
<button onclick="showScreen('admin')">管理</button>

<div id="gacha" class="screen active">
<input id="username" placeholder="名前">
<button onclick="draw(1)">単発</button>
<div id="result"></div>
</div>

<div id="admin" class="screen">
<button onclick="openModal()">追加</button>
<button onclick="clearAll()">全削除</button>
<div id="list"></div>
</div>

<div id="modal" style="display:none;">
<input id="name" placeholder="商品名">
<input id="weight" placeholder="重み">
<button onclick="saveItem()">保存</button>
<button onclick="closeModal()">閉じる</button>
</div>

<script>
const listEl = document.getElementById("list");
const modalEl = document.getElementById("modal");
const nameEl = document.getElementById("name");
const weightEl = document.getElementById("weight");

let items = JSON.parse(localStorage.getItem("gacha")) || [];
let editIndex = null;

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function render(){
  listEl.innerHTML = "";
  items.forEach((item,i)=>{
    listEl.innerHTML += `
      <div class="card">
        ${item.name}
        <button onclick="editItem(${i})">編集</button>
        <button onclick="deleteItem(${i})">削除</button>
      </div>
    `;
  });
}

function openModal(){
  editIndex = null;
  nameEl.value = "";
  weightEl.value = "";
  modalEl.style.display = "block";
}

function closeModal(){
  modalEl.style.display = "none";
}

function saveItem(){
  const n = nameEl.value.trim();
  const w = Number(weightEl.value);

  if(!n || !w) return alert("入力エラー");

  const data = {name:n, weight:w};

  if(editIndex===null) items.push(data);
  else items[editIndex] = data;

  localStorage.setItem("gacha", JSON.stringify(items));
  closeModal();
  render();
}

function editItem(i){
  const item = items[i];
  nameEl.value = item.name;
  weightEl.value = item.weight;
  editIndex = i;
  modalEl.style.display = "block";
}

function deleteItem(i){
  items.splice(i,1);
  localStorage.setItem("gacha", JSON.stringify(items));
  render();
}

function clearAll(){
  items = [];
  localStorage.removeItem("gacha");
  render();
}

function draw(){
  if(items.length===0) return alert("景品なし");
  const item = items[Math.floor(Math.random()*items.length)];
  document.getElementById("result").innerText = item.name;
}

render();
</script>

</body>
</html>
